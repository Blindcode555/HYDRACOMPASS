<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hydra Compass</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap');
  *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

 body {
  margin: 0;
  background: transparent !important;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;


  }

  .scene {
  position: relative;
  width: 148px;
  height: 148px;
  z-index: 2;
}

.bg-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: contain;
  object-position: center;
  pointer-events: none;
  user-select: none;
  display: block;
  z-index: 1;
}

.overlay-svg,
.orb,
.direction-label,
.hint {
  z-index: 2;
}

  .orb{animation:orbPulse 1.2s ease-in-out infinite alternate}
  @keyframes orbPulse{
    from{filter:drop-shadow(0 0 4px #f40) drop-shadow(0 0 10px #f40)}
    to  {filter:drop-shadow(0 0 9px #f60) drop-shadow(0 0 26px #f20)}
  }

  .cursor {
    position:fixed;width:14px;height:14px;
    border:2px solid rgba(80,200,255,.85);
    border-radius:50%;pointer-events:none;
    z-index:9999;transform:translate(-50%,-50%);
    box-shadow:0 0 8px #4af,0 0 16px #4af;
  }
  .cursor::after{
    content:'';position:absolute;inset:2px;
    background:rgba(80,200,255,.35);border-radius:50%;
  }

  .direction-label {
    position:absolute;bottom:-44px;left:50%;
    transform:translateX(-50%);
    color:rgba(180,220,255,.8);
    font-size:12px;letter-spacing:.35em;text-transform:uppercase;
    pointer-events:none;
    text-shadow:0 0 12px rgba(80,180,255,.9);
    white-space:nowrap;
  }
  .hint {
    position:absolute;top:-38px;left:50%;
    transform:translateX(-50%);
    color:rgba(120,180,255,.55);font-size:10px;letter-spacing:.5em;
    pointer-events:none;
    text-shadow:0 0 10px rgba(80,150,255,.6);
    white-space:nowrap;
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="scene">
  <div class="hint">HYDRA COMPASS · MOVE YOUR CURSOR</div>

  <!-- Original image, tightly cropped -->
<img class="bg-image" src="assets/logo-clean.png">
  <!-- SVG needle overlay - all geometry anchored to (298,354) -->
  <svg class="overlay-svg" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="gN" x1="0%" y1="100%" x2="0%" y2="0%">
        <stop offset="0%" stop-color="#990000"/>
        <stop offset="40%" stop-color="#ee2200"/>
        <stop offset="100%" stop-color="#ff5533"/>
      </linearGradient>
      <linearGradient id="gS" x1="0%" y1="0%" x2="0%" y2="100%">
        <stop offset="0%" stop-color="#b0ccff"/>
        <stop offset="100%" stop-color="#ffffff"/>
      </linearGradient>
      <radialGradient id="gOrb" cx="38%" cy="32%" r="62%">
        <stop offset="0%" stop-color="#ffaa66"/>
        <stop offset="40%" stop-color="#ff3300"/>
        <stop offset="100%" stop-color="#660000"/>
      </radialGradient>
      <filter id="fNeedle" x="-100%" y="-100%" width="300%" height="300%">
        <feGaussianBlur stdDeviation="2.5" result="bl"/>
        <feMerge><feMergeNode in="bl"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="fOrb" x="-120%" y="-120%" width="340%" height="340%">
        <feGaussianBlur stdDeviation="6" result="bl"/>
        <feMerge><feMergeNode in="bl"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!--
      ALL needle geometry defined with center=298,354.
      rotate(deg,298,354) spins EXACTLY around the orb.
      North tip: (298, 228)
      South tip: (298, 480)
      East  tip: (424, 354)
      West  tip: (172, 354)
    -->
    <g id="needle-group" filter="url(#fNeedle)">
      <!-- North blade -->
      <polygon points="298,228  292,354  298,340  304,354"
               fill="url(#gN)"/>
      <!-- South blade -->
      <polygon points="298,480  292,354  298,368  304,354"
               fill="url(#gS)" opacity=".85"/>
      <!-- East tick -->
      <polygon points="424,354  298,350  314,354  298,358"
               fill="rgba(160,200,255,.4)"/>
      <!-- West tick -->
      <polygon points="172,354  298,350  282,354  298,358"
               fill="rgba(160,200,255,.3)"/>
    </g>

    <!-- Orb pinned to center, never rotates -->
    <g class="orb" filter="url(#fOrb)">
      <circle cx="298" cy="354" r="13" fill="url(#gOrb)"/>
      <circle cx="298" cy="354" r="7"  fill="rgba(255,80,30,.8)"/>
      <circle cx="298" cy="354" r="3.5" fill="#fff" opacity=".95"/>
      <circle cx="295" cy="351" r="1.6" fill="rgba(255,255,255,.5)"/>
    </g>
  </svg>

  <div class="direction-label" id="dir-label">· POINT YOUR WAY ·</div>
</div>

<script>
const needle = document.getElementById('needle-group');
const cursor = document.getElementById('cursor');
const label  = document.getElementById('dir-label');
const scene  = document.querySelector('.scene');

// Compass center as ratio of scene
const CX_R = 298 / 600;
const CY_R = 354 / 600;
// SVG pivot (must match polygon geometry above)
const SVG_CX = 298;
const SVG_CY = 354;

const DIRS = ['N','NNE','NE','ENE','E','ESE','SE','SSE',
              'S','SSW','SW','WSW','W','WNW','NW','NNW'];

let targetAngle = 0, currentAngle = 0;

function getCenter() {
  const rc = scene.getBoundingClientRect();
  return { x: rc.left + rc.width*CX_R, y: rc.top + rc.height*CY_R };
}

function lerpAngle(a,b,t) {
  return a + (((b-a+540)%360)-180)*t;
}

(function tick(){
  currentAngle = lerpAngle(currentAngle, targetAngle, 0.10);
  needle.setAttribute('transform',`rotate(${currentAngle},${SVG_CX},${SVG_CY})`);
  requestAnimationFrame(tick);
})();

function onMove(cx,cy){
  cursor.style.left = cx+'px';
  cursor.style.top  = cy+'px';
  const c = getCenter();
  const angle = Math.atan2(cx-c.x, -(cy-c.y)) * 180/Math.PI;
  targetAngle = angle;
  const norm = ((angle%360)+360)%360;
  label.textContent = `· ${DIRS[Math.round(norm/22.5)%16]} · ${Math.round(norm)}° ·`;
}

document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
document.addEventListener('touchmove', e=>{
  e.preventDefault();
  onMove(e.touches[0].clientX, e.touches[0].clientY);
},{passive:false});

let isIdle=true, idleAngle=0, idleTimer;
document.addEventListener('mousemove',()=>{
  isIdle=false; clearTimeout(idleTimer);
  idleTimer=setTimeout(()=>isIdle=true, 3500);
});
(function idleTick(){
  if(isIdle){ idleAngle+=0.25; targetAngle=idleAngle; label.textContent='· POINT YOUR WAY ·'; }
  requestAnimationFrame(idleTick);
})();
</script>
</body>
</html>
